spring:
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:identity-service/.env[.properties]
      - optional:file:src/services/identity-service/.env[.properties]
  application:
    name: identity-service
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

server:
  port: ${SERVER_PORT:8081}

jwt:
  issuer: seika-identity-service
  # At least 256-bit for HS256
  secret: ${JWT_SECRET}
  access-token-expiration-minutes: ${JWT_ACCESS_TOKEN_EXPIRATION_MINUTES:60}
